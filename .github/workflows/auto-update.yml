name: Auto Update ATO Tax Rates

on:
  schedule:
    # 📅 定時鬧鐘：每個月的 1 號號凌晨 0:00 自動執行 (UTC 時間)
    - cron: '0 0 1 * *'
  workflow_dispatch: # 允許您隨時手動點擊按鈕強制執行

jobs:
  update-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予這個腳本自動修改、儲存您倉庫檔案的權限

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 執行自動更新腳本
      run: python update_rates.py

    - name: 自動將更新後的 JSON 檔推回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tax-rates.json
        git commit -m "Auto-updated tax-rates.json via GitHub Actions" || exit 0
        git push
